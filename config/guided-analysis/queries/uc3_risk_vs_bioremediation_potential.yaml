id: uc3_risk_vs_bioremediation_potential
category: compound_analysis
title: Risk vs Bioremediation Potential
question: Which compounds show high degradation potential and high risk?
description: Scatter plot using gene_count (potential) vs toxicity (risk), with pathway_count as point size.
dataset: compound_summary
executor: uc_risk_potential_scatter

use_case_description:
  scientific_question: Which compounds combine higher bioremediation potential and higher predicted toxicological risk under the selected endpoint context?
  description: This view compares potential (gene_count) and predicted risk (toxicity_risk_mean or selected endpoint) to support exploratory prioritization across compounds.
  visual_elements:
    - title: X-Axis (Bioremediation Potential)
      description: Uses gene_count with selectable linear or log10(gene_count + 1) scaling to reduce outlier compression and improve cluster readability.
    - title: Y-Axis (Predicted Risk)
      description: Uses toxicity_risk_mean or a selected endpoint-level prediction value, depending on the endpoint filter configuration.
    - title: Quadrant Thresholds
      description: Vertical and horizontal cut lines are computed from P75 values in the currently filtered scope, enabling context-adaptive quadrant segmentation.
    - title: Point Encoding
      description: Point color represents compound class and point size maps pathway annotation count, enabling multi-variable exploratory inspection.
  interpretation:
    - Compounds in the top-right quadrant indicate a combination of higher predicted risk and higher annotated potential within the current filtered scope.
    - Quadrant assignments are relative to the selected filters and percentile thresholds, so they should be interpreted as exploratory context, not fixed risk classes.
    - This chart supports hypothesis generation and triage decisions, and should be complemented with domain review and experimental evidence.

methods_modal:
  button_label: View Methods
  title: "UC-3: Risk vs Bioremediation Potential"
  introduction: This workflow compares potential and risk metrics for compounds under the selected toxicity context using a quadrant-based exploratory scatter.
  steps:
    - title: Scope and Filter Resolution
      description: The executor resolves typed filters (endpoint group, endpoint, class, ranges, search) over the compound_summary dataset.
    - title: Y Metric Selection
      description: Risk is mapped to toxicity_risk_mean by default or to a selected endpoint prediction value when endpoint filters are active.
    - title: Null Handling
      description: Compounds with null Y values are excluded from scatter plotting and counted explicitly in summary metadata.
    - title: Adaptive Threshold Calculation
      description: Quadrant cut lines are computed from P75 on filtered valid points for X and Y dimensions.
      bullets:
        - x_threshold = P75(gene_count in filtered scope)
        - y_threshold = P75(selected risk metric in filtered scope)
    - title: Scatter Encoding
      description: Points encode class by color and pathway annotations by size, with optional X-axis scaling mode.
      bullets:
        - X axis supports linear and log10(gene_count + 1) display modes.
    - title: Quadrant Prioritization Output
      description: Top-right compounds are ranked and paginated to support exploratory triage under the active context.
  footer_note: Quadrant placement is context-dependent and should be interpreted as exploratory prioritization, not a confirmed hazard classification.

defaults:
  page_size: 10
  x_scale: log10p1
  filters:
    endpoint_group: all
    endpoint: mean
    x_scale: log10p1
    focus_cluster: false

executor_config:
  x_field: gene_count
  y_field_default: toxicity_risk_mean
  threshold_basis: p75_filtered_scope
  top_right_sort:
    - field: y_value
      order: desc
    - field: gene_count
      order: desc

filters:
  - id: endpoint_group
    type: select
    label: Endpoint Group
    provider:
      type: static
      options:
        - value: all
          label: All groups
        - value: ecotoxicity
          label: Ecotoxicity
        - value: genotoxicity_carcinogenicity
          label: Genotoxicity & Carcinogenicity
        - value: nuclear_receptors
          label: Nuclear Receptors (NR)
        - value: stress_response
          label: Stress Response (SR)
        - value: organ_irritation
          label: Organ / Irritation
        - value: other
          label: Other
  - id: endpoint
    type: dependent_select
    label: Y Axis Endpoint
    depends_on: endpoint_group
    provider:
      type: query_derived
      source: toxicity_endpoints
      include_mean_option: true
      mean_option_label: toxicity_risk_mean (all endpoints mean)
  - id: x_scale
    type: select
    label: X Axis Scale
    provider:
      type: static
      options:
        - value: log10p1
          label: Log10 (gene_count + 1)
        - value: linear
          label: Linear
  - id: compoundclass
    type: select
    label: Compound Class
    provider:
      type: meta_endpoint
      endpoint: /api/meta/compound-classes
  - id: gene_count
    type: number_range
    label: Gene Count
    min: 0
  - id: y_value
    type: number_range
    label: Risk Score (Y)
    min: 0
    max: 1
    step: 0.01
  - id: pathway_count
    type: number_range
    label: Pathway Annotations
    min: 0
  - id: focus_cluster
    type: toggle
    label: Focus Cluster (Gene p95)
  - id: search
    type: search
    label: Search Compound
    placeholder: Name or CPD

summary_cards:
  - id: compounds_in_scope
    label: Compounds in Scope
    value_key: compounds_in_scope
  - id: plotted_points
    label: Plotted Points
    value_key: plotted_points
  - id: excluded_null_y
    label: Excluded (Null Y)
    value_key: excluded_null_y
  - id: top_right_count
    label: Top-right Quadrant
    value_key: top_right_count
  - id: p75_thresholds
    label: P75 Thresholds
    value_key: thresholds_label

visualizations:
  - id: uc3_scatter
    type: scatter_quadrant
    title: Risk vs Bioremediation Potential
    subtitle: x = gene_count (selectable scale), y = selected risk metric, thresholds = P75 filtered scope
    data_key: scatter_points

table:
  id: uc3_table
  title: Top-right quadrant compounds
  subtitle: High Risk + High Potential compounds
  row_click_field: cpd
  empty_message: No compounds in the top-right quadrant for current filters.
  columns:
    - id: rank
      label: Rank
      type: number
    - id: cpd
      label: Compound ID
      type: compound_link
    - id: compoundname
      label: Name
      type: text
    - id: compoundclass
      label: Class
      type: text
    - id: gene_count
      label: Gene Count
      type: number
    - id: y_value
      label: Y Value
      type: number
    - id: pathway_count
      label: Pathway Annotations
      type: number

insights:
  - id: uc3_insight
    text: Top-right compounds combine high degradation potential with elevated risk, useful for environmental prioritization.
