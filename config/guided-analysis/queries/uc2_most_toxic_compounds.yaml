id: uc2_most_toxic_compounds
category: compound_analysis
title: Most Toxic Compounds
question: Which compounds present the highest predicted toxicological risk?
description: Ranking by real ToxCSM endpoint values using either a single endpoint or endpoint-group peak mode.
dataset: compound_summary
executor: uc_most_toxic_compounds

use_case_description:
  scientific_question: Which compounds rank higher in predicted toxicological risk when evaluated by a selected endpoint context?
  description: This use case ranks compounds using only real endpoint prediction values from toxicity_endpoint, either for one endpoint or for the maximum value within a selected endpoint group.
  visual_elements:
    - title: Ranking Table
      description: Compounds are ordered by prediction value (descending) with deterministic tie-breaks to support reproducible exploratory comparison.
    - title: Toxicity Heatmap
      description: The heatmap shows ranked compounds on Y-axis and endpoint columns on X-axis, preserving endpoint-level values without mean aggregation.
    - title: Endpoint Context
      description: Risk context is explicitly controlled by filters for endpoint group and mode (single endpoint or group peak).
  interpretation:
    - Higher positions indicate stronger predicted toxicity under the selected endpoint context, and should be interpreted as exploratory prioritization signals.
    - Group-peak mode highlights compounds with stronger endpoint-specific alerts inside a domain, but does not establish causal toxicity mechanisms.
    - This output is suitable for hypothesis generation and triage, and should be complemented with domain review and experimental validation.

methods_modal:
  button_label: View Methods
  title: "UC-2: Most Toxic Compounds"
  introduction: This workflow ranks compounds by endpoint-level ToxCSM predictions using configurable endpoint context.
  steps:
    - title: Scope Selection
      description: The compound scope is loaded from compound_summary and filtered server-side by typed filters.
    - title: Endpoint Context Resolution
      description: Risk mode defines whether ranking uses one endpoint or the peak endpoint value in the selected group.
      bullets:
        - Single endpoint mode uses one selected endpoint directly.
        - Group peak mode uses MAX(value) across endpoints in the selected group.
    - title: Null and Range Handling
      description: Compounds with null endpoint values are excluded and counted; optional Y-range filter is then applied.
    - title: Ranking and Pagination
      description: Valid compounds are ranked by prediction value (desc), then gene_count (desc), then cpd (asc), and paginated.
    - title: Heatmap Assembly
      description: Heatmap cells are fetched from toxicity_endpoint for the ranked top-N compounds and endpoint context columns.
  footer_note: Predictions are model-derived endpoint scores and should be used as exploratory evidence, not confirmed hazard determinations.

defaults:
  page_size: 10
  filters:
    risk_mode: endpoint
    endpoint_group: all
    endpoint: avian

executor_config:
  heatmap_top_n: 30

filters:
  - id: risk_mode
    type: select
    label: Risk Mode
    provider:
      type: static
      options:
        - value: endpoint
          label: Single Endpoint
        - value: group_peak
          label: Endpoint Group Peak (MAX)
  - id: endpoint_group
    type: select
    label: Endpoint Group
    provider:
      type: static
      options:
        - value: all
          label: All groups
        - value: ecotoxicity
          label: Ecotoxicity
        - value: genotoxicity_carcinogenicity
          label: Genotoxicity & Carcinogenicity
        - value: nuclear_receptors
          label: Nuclear Receptors (NR)
        - value: stress_response
          label: Stress Response (SR)
        - value: organ_irritation
          label: Organ / Irritation
        - value: other
          label: Other
  - id: endpoint
    type: dependent_select
    label: Endpoint
    depends_on: endpoint_group
    provider:
      type: query_derived
      source: toxicity_endpoints
  - id: compoundclass
    type: select
    label: Compound Class
    provider:
      type: meta_endpoint
      endpoint: /api/meta/compound-classes
  - id: y_value
    type: number_range
    label: Prediction Value
    min: 0
    max: 1
    step: 0.01
  - id: gene_count
    type: number_range
    label: Gene Count
    min: 0
  - id: pathway_count
    type: number_range
    label: Pathway Annotations
    min: 0
  - id: search
    type: search
    label: Search Compound
    placeholder: Name or CPD

summary_cards:
  - id: compounds_in_scope
    label: Compounds in Scope
    value_key: compounds_in_scope
  - id: ranked_points
    label: Ranked Compounds
    value_key: ranked_points
  - id: excluded_null_y
    label: Excluded (Null Endpoint)
    value_key: excluded_null_y
  - id: risk_mode_label
    label: Risk Mode
    value_key: risk_mode_label
  - id: endpoint_context
    label: Endpoint Context
    value_key: endpoint_context

visualizations:
  - id: uc2_heatmap
    type: heatmap_matrix
    title: Toxicity Heatmap
    subtitle: Compounds on Y-axis and grouped endpoints on top
    data_key: toxicity_matrix

table:
  id: uc2_table
  title: Ranked compounds by endpoint risk
  subtitle: Ranking under selected endpoint context
  row_click_field: cpd
  empty_message: No compounds available for the selected endpoint context.
  columns:
    - id: rank
      label: Rank
      type: number
    - id: cpd
      label: Compound ID
      type: compound_link
    - id: compoundname
      label: Name
      type: text
    - id: compoundclass
      label: Class
      type: text
    - id: y_value
      label: Prediction Value
      type: number
    - id: endpoint_used
      label: Endpoint Used
      type: text
    - id: gene_count
      label: Gene Count
      type: number
    - id: pathway_count
      label: Pathway Annotations
      type: number

insights:
  - id: uc2_insight
    text: Higher-ranked compounds indicate stronger model-predicted endpoint risk in the active endpoint context.
