version: v1
note: Query recipes are static examples for reproducibility and do not reflect active UI filters.
queries:
  uc1_top_bioremediation_compounds:
    button_label: View Queries
    title: UC-1 Query Recipes (Top Bioremediation Compounds)
    introduction: Reproduce the ranking used in UC-1 using the same canonical compound_summary table.
    sqlite:
      description: Top compounds by KO count with deterministic tie-break.
      query: |
        SELECT
          cpd,
          compoundname,
          compoundclass,
          ko_count,
          gene_count,
          pathway_count
        FROM compound_summary
        ORDER BY ko_count DESC, cpd ASC
        LIMIT 10;
    python:
      description: Python sqlite3 script to run the same ranking query.
      script: |
        import sqlite3

        db_path = "data/biorempp.sqlite"
        query = """
        SELECT
          cpd,
          compoundname,
          compoundclass,
          ko_count,
          gene_count,
          pathway_count
        FROM compound_summary
        ORDER BY ko_count DESC, cpd ASC
        LIMIT 10;
        """

        with sqlite3.connect(db_path) as conn:
          rows = conn.execute(query).fetchall()
          for row in rows:
            print(row)
    notes:
      - This recipe is exploratory and should be interpreted as annotation-based prioritization.

  uc2_most_toxic_compounds:
    button_label: View Queries
    title: UC-2 Query Recipes (Most Toxic Compounds)
    introduction: Reproduce UC-2 ranking using only real endpoint prediction values (single endpoint or endpoint-group peak).
    sqlite:
      description: Parameterized ranking based on endpoint values from toxicity_endpoint (no mean aggregation).
      query: |
        WITH params AS (
          -- risk_mode: 'endpoint' or 'group_peak'
          -- endpoint_group: 'all', 'ecotoxicity', 'genotoxicity_carcinogenicity', 'nuclear_receptors', 'stress_response', 'organ_irritation', 'other'
          SELECT
            'group_peak' AS risk_mode,
            'ecotoxicity' AS endpoint_group,
            'avian' AS endpoint
        ),
        endpoint_scoped AS (
          SELECT
            te.cpd,
            te.endpoint,
            te.value
          FROM toxicity_endpoint te
          CROSS JOIN params p
          WHERE te.value IS NOT NULL
            AND (
              p.endpoint_group = 'all'
              OR (
                p.endpoint_group = 'ecotoxicity'
                AND te.endpoint IN ('avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation')
              )
              OR (
                p.endpoint_group = 'genotoxicity_carcinogenicity'
                AND te.endpoint IN ('genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus')
              )
              OR (
                p.endpoint_group = 'nuclear_receptors'
                AND te.endpoint IN ('nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr')
              )
              OR (
                p.endpoint_group = 'stress_response'
                AND te.endpoint IN ('sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53')
              )
              OR (
                p.endpoint_group = 'organ_irritation'
                AND te.endpoint IN ('eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor')
              )
              OR (
                p.endpoint_group = 'other'
                AND te.endpoint NOT IN (
                  'avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation',
                  'genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus',
                  'nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr',
                  'sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53',
                  'eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor'
                )
              )
            )
        ),
        grouped_max AS (
          SELECT
            cpd,
            MAX(value) AS y_value
          FROM endpoint_scoped
          GROUP BY cpd
        ),
        grouped_choice AS (
          SELECT
            es.cpd,
            MIN(es.endpoint) AS endpoint_used
          FROM endpoint_scoped es
          JOIN grouped_max gm
            ON gm.cpd = es.cpd
           AND gm.y_value = es.value
          GROUP BY es.cpd
        ),
        metric AS (
          SELECT
            cs.cpd,
            cs.compoundname,
            cs.compoundclass,
            cs.gene_count,
            cs.pathway_count,
            CASE
              WHEN p.risk_mode = 'endpoint' THEN se.value
              ELSE gm.y_value
            END AS y_value,
            CASE
              WHEN p.risk_mode = 'endpoint' THEN p.endpoint
              ELSE gc.endpoint_used
            END AS endpoint_used
          FROM compound_summary cs
          CROSS JOIN params p
          LEFT JOIN toxicity_endpoint se
            ON se.cpd = cs.cpd
           AND se.endpoint = p.endpoint
          LEFT JOIN grouped_max gm
            ON gm.cpd = cs.cpd
          LEFT JOIN grouped_choice gc
            ON gc.cpd = cs.cpd
        )
        SELECT
          cpd,
          compoundname,
          compoundclass,
          gene_count,
          pathway_count,
          endpoint_used,
          y_value
        FROM metric
        WHERE y_value IS NOT NULL
        ORDER BY y_value DESC, gene_count DESC, cpd ASC
        LIMIT 10;
    python:
      description: Python sqlite3 script for UC-2 with selectable mode and endpoint context.
      script: |
        import sqlite3

        db_path = "data/biorempp.sqlite"
        query = """
        WITH params AS (
          SELECT
            'group_peak' AS risk_mode,
            'ecotoxicity' AS endpoint_group,
            'avian' AS endpoint
        ),
        endpoint_scoped AS (
          SELECT
            te.cpd,
            te.endpoint,
            te.value
          FROM toxicity_endpoint te
          CROSS JOIN params p
          WHERE te.value IS NOT NULL
            AND (
              p.endpoint_group = 'all'
              OR (
                p.endpoint_group = 'ecotoxicity'
                AND te.endpoint IN ('avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation')
              )
              OR (
                p.endpoint_group = 'genotoxicity_carcinogenicity'
                AND te.endpoint IN ('genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus')
              )
              OR (
                p.endpoint_group = 'nuclear_receptors'
                AND te.endpoint IN ('nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr')
              )
              OR (
                p.endpoint_group = 'stress_response'
                AND te.endpoint IN ('sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53')
              )
              OR (
                p.endpoint_group = 'organ_irritation'
                AND te.endpoint IN ('eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor')
              )
              OR (
                p.endpoint_group = 'other'
                AND te.endpoint NOT IN (
                  'avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation',
                  'genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus',
                  'nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr',
                  'sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53',
                  'eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor'
                )
              )
            )
        ),
        grouped_max AS (
          SELECT
            cpd,
            MAX(value) AS y_value
          FROM endpoint_scoped
          GROUP BY cpd
        ),
        grouped_choice AS (
          SELECT
            es.cpd,
            MIN(es.endpoint) AS endpoint_used
          FROM endpoint_scoped es
          JOIN grouped_max gm
            ON gm.cpd = es.cpd
           AND gm.y_value = es.value
          GROUP BY es.cpd
        ),
        metric AS (
          SELECT
            cs.cpd,
            cs.compoundname,
            cs.compoundclass,
            cs.gene_count,
            cs.pathway_count,
            CASE
              WHEN p.risk_mode = 'endpoint' THEN se.value
              ELSE gm.y_value
            END AS y_value,
            CASE
              WHEN p.risk_mode = 'endpoint' THEN p.endpoint
              ELSE gc.endpoint_used
            END AS endpoint_used
          FROM compound_summary cs
          CROSS JOIN params p
          LEFT JOIN toxicity_endpoint se
            ON se.cpd = cs.cpd
           AND se.endpoint = p.endpoint
          LEFT JOIN grouped_max gm
            ON gm.cpd = cs.cpd
          LEFT JOIN grouped_choice gc
            ON gc.cpd = cs.cpd
        )
        SELECT
          cpd,
          compoundname,
          compoundclass,
          gene_count,
          pathway_count,
          endpoint_used,
          y_value
        FROM metric
        WHERE y_value IS NOT NULL
        ORDER BY y_value DESC, gene_count DESC, cpd ASC
        LIMIT 10;
        """

        with sqlite3.connect(db_path) as conn:
          rows = conn.execute(query).fetchall()
          print("rows:", len(rows))
          for row in rows:
            print(row)
    notes:
      - This UC uses only real endpoint values from toxicity_endpoint.
      - Group mode uses peak endpoint value (MAX) and not mean aggregation.

  uc4_regulated_by_agency:
    button_label: View Queries
    title: UC-4 Query Recipes (Regulated Compounds by Agency)
    introduction: Reproduce UC-4 filtering and ranking by agency references from compound_reference_map, keeping each IARC class independent.
    sqlite:
      description: Agency-filtered ranking with dynamic agency list from the database (no hardcoded subset).
      query: |
        WITH params AS (
          -- reference_ag: 'all' or one exact value from compound_reference_map.reference_ag
          SELECT 'all' AS reference_ag
        ),
        agency_scope AS (
          SELECT DISTINCT reference_ag AS agency
          FROM compound_reference_map
          WHERE reference_ag IS NOT NULL
            AND (
              (SELECT reference_ag FROM params) = 'all'
              OR reference_ag = (SELECT reference_ag FROM params)
            )
        ),
        matched AS (
          SELECT
            cs.cpd,
            cs.compoundname,
            cs.compoundclass,
            cs.reference_count,
            cs.gene_count,
            cs.pathway_count,
            crm.reference_ag
          FROM compound_summary cs
          JOIN compound_reference_map crm
            ON crm.cpd = cs.cpd
          JOIN agency_scope ag
            ON ag.agency = crm.reference_ag
        )
        SELECT
          cpd,
          compoundname,
          compoundclass,
          reference_count,
          gene_count,
          pathway_count,
          GROUP_CONCAT(DISTINCT reference_ag) AS matched_references
        FROM matched
        GROUP BY
          cpd,
          compoundname,
          compoundclass,
          reference_count,
          gene_count,
          pathway_count
        ORDER BY reference_count DESC, cpd ASC
        LIMIT 10;
    python:
      description: Python sqlite3 script for UC-4 with dynamic agency list and independent IARC labels.
      script: |
        import sqlite3

        db_path = "data/biorempp.sqlite"
        query = """
        WITH params AS (
          SELECT 'all' AS reference_ag
        ),
        agency_scope AS (
          SELECT DISTINCT reference_ag AS agency
          FROM compound_reference_map
          WHERE reference_ag IS NOT NULL
            AND (
              (SELECT reference_ag FROM params) = 'all'
              OR reference_ag = (SELECT reference_ag FROM params)
            )
        ),
        matched AS (
          SELECT
            cs.cpd,
            cs.compoundname,
            cs.compoundclass,
            cs.reference_count,
            cs.gene_count,
            cs.pathway_count,
            crm.reference_ag
          FROM compound_summary cs
          JOIN compound_reference_map crm
            ON crm.cpd = cs.cpd
          JOIN agency_scope ag
            ON ag.agency = crm.reference_ag
        )
        SELECT
          cpd,
          compoundname,
          compoundclass,
          reference_count,
          gene_count,
          pathway_count,
          GROUP_CONCAT(DISTINCT reference_ag) AS matched_references
        FROM matched
        GROUP BY
          cpd,
          compoundname,
          compoundclass,
          reference_count,
          gene_count,
          pathway_count
        ORDER BY reference_count DESC, cpd ASC
        LIMIT 10;
        """

        with sqlite3.connect(db_path) as conn:
          rows = conn.execute(query).fetchall()
          print("rows:", len(rows))
          for row in rows:
            print(row)
    notes:
      - IARC labels remain separated (IARC1, IARC2A, IARC2B).
      - This query is for exploratory regulatory relevance and not a regulatory decision engine.

  uc5_pathways_functional_coverage:
    button_label: View Queries
    title: UC-5 Query Recipes (Pathways Functional Coverage)
    introduction: Reproduce UC-5 pathway ranking by distinct KO coverage from the deduplicated relation table.
    sqlite:
      description: Pathway ranking by COUNT(DISTINCT ko), with optional source filter.
      query: |
        WITH params AS (
          -- source: 'all' | 'KEGG' | 'HADEG' | 'COMPOUND_PATHWAY'
          SELECT 'all' AS source
        ),
        grouped AS (
          SELECT
            rel.pathway,
            COUNT(DISTINCT rel.ko) AS ko_count,
            COUNT(DISTINCT rel.cpd) AS compound_count
          FROM compound_ko_pathway_rel rel
          WHERE (SELECT source FROM params) = 'all'
             OR rel.source = (SELECT source FROM params)
          GROUP BY rel.pathway
        )
        SELECT
          pathway,
          ko_count,
          compound_count
        FROM grouped
        ORDER BY ko_count DESC, pathway ASC
        LIMIT 10;
    python:
      description: Python sqlite3 script for UC-5 pathway KO coverage ranking.
      script: |
        import sqlite3

        db_path = "data/biorempp.sqlite"
        query = """
        WITH params AS (
          SELECT 'all' AS source
        ),
        grouped AS (
          SELECT
            rel.pathway,
            COUNT(DISTINCT rel.ko) AS ko_count,
            COUNT(DISTINCT rel.cpd) AS compound_count
          FROM compound_ko_pathway_rel rel
          WHERE (SELECT source FROM params) = 'all'
             OR rel.source = (SELECT source FROM params)
          GROUP BY rel.pathway
        )
        SELECT
          pathway,
          ko_count,
          compound_count
        FROM grouped
        ORDER BY ko_count DESC, pathway ASC
        LIMIT 10;
        """

        with sqlite3.connect(db_path) as conn:
          rows = conn.execute(query).fetchall()
          print("rows:", len(rows))
          for row in rows:
            print(row)
    notes:
      - Functional coverage in this UC is defined as distinct KO count by pathway.
      - Results are exploratory and sensitive to selected source scope.

  uc7_genes_most_connected:
    button_label: View Queries
    title: UC-7 Query Recipes (Most Connected Genes)
    introduction: Reproduce UC-7 gene connectivity ranking by counting distinct compounds per gene symbol.
    sqlite:
      description: Gene ranking by COUNT(DISTINCT cpd), with optional search and range filters.
      query: |
        WITH gene_rank AS (
          SELECT
            cgm.genesymbol,
            MIN(NULLIF(TRIM(cgc.genename), '')) AS gene_name,
            COUNT(DISTINCT cgm.cpd) AS compound_count,
            COUNT(DISTINCT cgc.ko) AS ko_count
          FROM compound_gene_map cgm
          LEFT JOIN compound_gene_card cgc
            ON cgc.cpd = cgm.cpd
           AND cgc.genesymbol = cgm.genesymbol
          WHERE cgm.genesymbol IS NOT NULL
            AND TRIM(cgm.genesymbol) <> ''
          GROUP BY cgm.genesymbol
        )
        SELECT
          genesymbol,
          gene_name,
          compound_count,
          ko_count
        FROM gene_rank
        ORDER BY compound_count DESC, genesymbol ASC
        LIMIT 10;
    python:
      description: Python sqlite3 script to run UC-7 ranking with the same SQL logic.
      script: |
        import sqlite3

        db_path = "data/biorempp.sqlite"
        query = """
        WITH gene_rank AS (
          SELECT
            cgm.genesymbol,
            MIN(NULLIF(TRIM(cgc.genename), '')) AS gene_name,
            COUNT(DISTINCT cgm.cpd) AS compound_count,
            COUNT(DISTINCT cgc.ko) AS ko_count
          FROM compound_gene_map cgm
          LEFT JOIN compound_gene_card cgc
            ON cgc.cpd = cgm.cpd
           AND cgc.genesymbol = cgm.genesymbol
          WHERE cgm.genesymbol IS NOT NULL
            AND TRIM(cgm.genesymbol) <> ''
          GROUP BY cgm.genesymbol
        )
        SELECT
          genesymbol,
          gene_name,
          compound_count,
          ko_count
        FROM gene_rank
        ORDER BY compound_count DESC, genesymbol ASC
        LIMIT 10;
        """

        with sqlite3.connect(db_path) as conn:
          rows = conn.execute(query).fetchall()
          print("rows:", len(rows))
          for row in rows:
            print(row)
    notes:
      - UC7 connectivity is defined as distinct compounds per gene symbol.
      - Results are exploratory connectivity signals for hypothesis generation.

  uc8_genes_linked_toxic_compounds:
    button_label: View Queries
    title: UC-8 Query Recipes (Genes Linked to Toxic Compounds)
    introduction: Reproduce gene-level toxic compound linkage by joining gene-compound mappings with endpoint-level toxicity values.
    sqlite:
      description: Gene ranking by toxic compound count under selected endpoint and threshold window, with median and p90 toxicity statistics.
      query: |
        WITH params AS (
          -- endpoint: selected endpoint (example: avian)
          -- threshold_min / threshold_max: toxicity value window
          SELECT
            'avian' AS endpoint,
            0.00 AS threshold_min,
            NULL AS threshold_max
        ),
        gene_scope AS (
          SELECT
            cgm.genesymbol,
            MIN(NULLIF(TRIM(cgc.genename), '')) AS gene_name,
            COUNT(DISTINCT cgm.cpd) AS compound_count,
            COUNT(DISTINCT cgc.ko) AS ko_count
          FROM compound_gene_map cgm
          LEFT JOIN compound_gene_card cgc
            ON cgc.cpd = cgm.cpd
           AND cgc.genesymbol = cgm.genesymbol
          WHERE cgm.genesymbol IS NOT NULL
            AND TRIM(cgm.genesymbol) <> ''
          GROUP BY cgm.genesymbol
        ),
        toxic_distribution AS (
          SELECT
            cgm.genesymbol,
            cgm.cpd,
            te.value AS toxicity_value
          FROM compound_gene_map cgm
          LEFT JOIN toxicity_endpoint te
            ON te.cpd = cgm.cpd
          CROSS JOIN params p
          WHERE cgm.genesymbol IS NOT NULL
            AND TRIM(cgm.genesymbol) <> ''
            AND te.endpoint = p.endpoint
            AND te.value IS NOT NULL
            AND (p.threshold_min IS NULL OR te.value >= p.threshold_min)
            AND (p.threshold_max IS NULL OR te.value <= p.threshold_max)
          GROUP BY cgm.genesymbol, cgm.cpd
        ),
        ranked AS (
          SELECT
            genesymbol,
            toxicity_value,
            ROW_NUMBER() OVER (
              PARTITION BY genesymbol
              ORDER BY toxicity_value
            ) AS rn,
            COUNT(*) OVER (
              PARTITION BY genesymbol
            ) AS n
          FROM toxic_distribution
        ),
        quantiles AS (
          SELECT
            genesymbol,
            COUNT(*) AS toxic_compound_count,
            MAX(
              CASE
                WHEN rn = CAST((n - 1) * 0.50 AS INT) + 1
                THEN toxicity_value
              END
            ) AS median_toxicity,
            MAX(
              CASE
                WHEN rn = CAST((n - 1) * 0.90 AS INT) + 1
                THEN toxicity_value
              END
            ) AS p90_toxicity,
            MAX(toxicity_value) AS max_prediction
          FROM ranked
          GROUP BY genesymbol
        )
        SELECT
          gs.genesymbol,
          gs.gene_name,
          gs.compound_count,
          q.toxic_compound_count,
          gs.ko_count,
          ROUND(q.median_toxicity, 4) AS median_toxicity,
          ROUND(q.p90_toxicity, 4) AS p90_toxicity,
          ROUND(q.max_prediction, 4) AS max_prediction
        FROM gene_scope gs
        JOIN quantiles q
          ON q.genesymbol = gs.genesymbol
        WHERE q.toxic_compound_count > 0
        ORDER BY q.toxic_compound_count DESC, q.max_prediction DESC, gs.genesymbol ASC
        LIMIT 10;
    python:
      description: Python sqlite3 script to run UC-8 ranking with endpoint-level threshold filtering and quantile metrics.
      script: |
        import sqlite3

        db_path = "data/biorempp.sqlite"
        endpoint = "avian"
        threshold_min = 0.0
        threshold_max = None

        query = """
        WITH params AS (
          SELECT
            ? AS endpoint,
            ? AS threshold_min,
            ? AS threshold_max
        ),
        gene_scope AS (
          SELECT
            cgm.genesymbol,
            MIN(NULLIF(TRIM(cgc.genename), '')) AS gene_name,
            COUNT(DISTINCT cgm.cpd) AS compound_count,
            COUNT(DISTINCT cgc.ko) AS ko_count
          FROM compound_gene_map cgm
          LEFT JOIN compound_gene_card cgc
            ON cgc.cpd = cgm.cpd
           AND cgc.genesymbol = cgm.genesymbol
          WHERE cgm.genesymbol IS NOT NULL
            AND TRIM(cgm.genesymbol) <> ''
          GROUP BY cgm.genesymbol
        ),
        toxic_distribution AS (
          SELECT
            cgm.genesymbol,
            cgm.cpd,
            te.value AS toxicity_value
          FROM compound_gene_map cgm
          LEFT JOIN toxicity_endpoint te
            ON te.cpd = cgm.cpd
          CROSS JOIN params p
          WHERE cgm.genesymbol IS NOT NULL
            AND TRIM(cgm.genesymbol) <> ''
            AND te.endpoint = p.endpoint
            AND te.value IS NOT NULL
            AND (p.threshold_min IS NULL OR te.value >= p.threshold_min)
            AND (p.threshold_max IS NULL OR te.value <= p.threshold_max)
          GROUP BY cgm.genesymbol, cgm.cpd
        ),
        ranked AS (
          SELECT
            genesymbol,
            toxicity_value,
            ROW_NUMBER() OVER (
              PARTITION BY genesymbol
              ORDER BY toxicity_value
            ) AS rn,
            COUNT(*) OVER (
              PARTITION BY genesymbol
            ) AS n
          FROM toxic_distribution
        ),
        quantiles AS (
          SELECT
            genesymbol,
            COUNT(*) AS toxic_compound_count,
            MAX(
              CASE
                WHEN rn = CAST((n - 1) * 0.50 AS INT) + 1
                THEN toxicity_value
              END
            ) AS median_toxicity,
            MAX(
              CASE
                WHEN rn = CAST((n - 1) * 0.90 AS INT) + 1
                THEN toxicity_value
              END
            ) AS p90_toxicity,
            MAX(toxicity_value) AS max_prediction
          FROM ranked
          GROUP BY genesymbol
        )
        SELECT
          gs.genesymbol,
          gs.gene_name,
          gs.compound_count,
          q.toxic_compound_count,
          gs.ko_count,
          ROUND(q.median_toxicity, 4) AS median_toxicity,
          ROUND(q.p90_toxicity, 4) AS p90_toxicity,
          ROUND(q.max_prediction, 4) AS max_prediction
        FROM gene_scope gs
        JOIN quantiles q
          ON q.genesymbol = gs.genesymbol
        WHERE q.toxic_compound_count > 0
        ORDER BY q.toxic_compound_count DESC, q.max_prediction DESC, gs.genesymbol ASC
        LIMIT 10;
        """

        with sqlite3.connect(db_path) as conn:
          rows = conn.execute(
            query,
            (endpoint, threshold_min, threshold_max),
          ).fetchall()
          print("rows:", len(rows))
          for row in rows:
            print(row)
    notes:
      - UC8 toxic linkage is defined as COUNT(DISTINCT cpd) above the selected endpoint threshold.
      - Results are exploratory endpoint-context signals for hypothesis generation and prioritization.

  uc6_pathways_toxic_compounds:
    button_label: View Queries
    title: UC-6 Query Recipes (Pathways Associated with Toxic Compounds)
    introduction: Reproduce pathway-level toxic association ranking by joining pathway-compound links with endpoint-level toxicity values.
    sqlite:
      description: Pathway ranking under endpoint context with prediction threshold filtering (no mean-derived toxicity score).
      query: |
        WITH params AS (
          -- source: 'all' | 'KEGG' | 'HADEG' | 'COMPOUND_PATHWAY'
          -- risk_mode: 'endpoint' | 'group_peak'
          -- endpoint_group: 'all' | 'ecotoxicity' | 'genotoxicity_carcinogenicity' | 'nuclear_receptors' | 'stress_response' | 'organ_irritation' | 'other'
          -- endpoint: explicit endpoint when risk_mode='endpoint'
          -- threshold_min: prediction lower bound
          SELECT
            'all' AS source,
            'endpoint' AS risk_mode,
            'all' AS endpoint_group,
            'avian' AS endpoint,
            0.5 AS threshold_min
        ),
        base AS (
          SELECT DISTINCT rel.pathway, rel.source, rel.cpd
          FROM compound_ko_pathway_rel rel
          CROSS JOIN params p
          WHERE p.source = 'all' OR rel.source = p.source
        ),
        endpoints_scoped AS (
          SELECT
            te.cpd,
            te.endpoint,
            te.value
          FROM toxicity_endpoint te
          CROSS JOIN params p
          WHERE te.value IS NOT NULL
            AND (
              p.endpoint_group = 'all'
              OR (
                p.endpoint_group = 'ecotoxicity'
                AND te.endpoint IN ('avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation')
              )
              OR (
                p.endpoint_group = 'genotoxicity_carcinogenicity'
                AND te.endpoint IN ('genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus')
              )
              OR (
                p.endpoint_group = 'nuclear_receptors'
                AND te.endpoint IN ('nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr')
              )
              OR (
                p.endpoint_group = 'stress_response'
                AND te.endpoint IN ('sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53')
              )
              OR (
                p.endpoint_group = 'organ_irritation'
                AND te.endpoint IN ('eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor')
              )
              OR (
                p.endpoint_group = 'other'
                AND te.endpoint NOT IN (
                  'avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation',
                  'genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus',
                  'nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr',
                  'sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53',
                  'eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor'
                )
              )
            )
        ),
        endpoint_max AS (
          SELECT cpd, MAX(value) AS y_value
          FROM endpoints_scoped
          GROUP BY cpd
        ),
        endpoint_selected AS (
          SELECT te.cpd, te.value AS y_value
          FROM toxicity_endpoint te
          CROSS JOIN params p
          WHERE te.endpoint = p.endpoint
        ),
        risk_by_compound AS (
          SELECT
            b.pathway,
            b.cpd,
            CASE
              WHEN p.risk_mode = 'endpoint' THEN es.y_value
              ELSE em.y_value
            END AS y_value
          FROM base b
          CROSS JOIN params p
          LEFT JOIN endpoint_selected es ON es.cpd = b.cpd
          LEFT JOIN endpoint_max em ON em.cpd = b.cpd
        ),
        pathway_stats AS (
          SELECT
            pathway,
            COUNT(DISTINCT cpd) AS compound_count,
            COUNT(DISTINCT CASE WHEN y_value IS NOT NULL AND y_value >= (SELECT threshold_min FROM params) THEN cpd END) AS toxic_compound_count,
            MAX(CASE WHEN y_value IS NOT NULL AND y_value >= (SELECT threshold_min FROM params) THEN y_value END) AS max_prediction
          FROM risk_by_compound
          GROUP BY pathway
        )
        SELECT
          pathway,
          compound_count,
          toxic_compound_count,
          ROUND(CASE WHEN compound_count = 0 THEN 0 ELSE (toxic_compound_count * 100.0 / compound_count) END, 2) AS toxic_ratio,
          max_prediction
        FROM pathway_stats
        WHERE toxic_compound_count > 0
        ORDER BY toxic_compound_count DESC, max_prediction DESC, pathway ASC
        LIMIT 10;
    python:
      description: Python sqlite3 script reproducing UC-6 pathway toxicity ranking under endpoint context and threshold.
