                p.endpoint_group = 'other'
                AND te.endpoint NOT IN (
                  'avian', 'crustacean', 'fathead_minnow', 'honey_bee', 't._pyriformis', 'biodegradation',
                  'genomic_ames_mutagenesis', 'genomic_carcinogenesis', 'genomic_micronucleus',
                  'nr_ahr', 'nr_ar', 'nr_ar_lbd', 'nr_aromatase', 'nr_er', 'nr_er_lbd', 'nr_gr', 'nr_ppar_gamma', 'nr_tr',
                  'sr_are', 'sr_atad5', 'sr_hse', 'sr_mmp', 'sr_p53',
                  'eye_corrosion', 'eye_irritation', 'skin_sensitisation', 'liver_injury_i', 'liver_injury_ii', 'respiratory_disease', 'herg_i_inhibitor', 'herg_ii_inhibitor'
                )
              )
            )
        ),
        endpoint_max AS (
          SELECT cpd, MAX(value) AS y_value
          FROM endpoints_scoped
          GROUP BY cpd
        ),
        endpoint_selected AS (
          SELECT te.cpd, te.value AS y_value
          FROM toxicity_endpoint te
          CROSS JOIN params p
          WHERE te.endpoint = p.endpoint
        ),
        risk_by_compound AS (
          SELECT
            b.pathway,
            b.cpd,
            CASE
              WHEN p.risk_mode = 'endpoint' THEN es.y_value
              ELSE em.y_value
            END AS y_value
          FROM base b
          CROSS JOIN params p
          LEFT JOIN endpoint_selected es ON es.cpd = b.cpd
          LEFT JOIN endpoint_max em ON em.cpd = b.cpd
        ),
        pathway_stats AS (
          SELECT
            pathway,
            COUNT(DISTINCT cpd) AS compound_count,
            COUNT(DISTINCT CASE WHEN y_value IS NOT NULL AND y_value >= (SELECT threshold_min FROM params) THEN cpd END) AS toxic_compound_count,
            MAX(CASE WHEN y_value IS NOT NULL AND y_value >= (SELECT threshold_min FROM params) THEN y_value END) AS max_prediction
          FROM risk_by_compound
          GROUP BY pathway
        )
        SELECT
          pathway,
          compound_count,
          toxic_compound_count,
          ROUND(CASE WHEN compound_count = 0 THEN 0 ELSE (toxic_compound_count * 100.0 / compound_count) END, 2) AS toxic_ratio,
          max_prediction
        FROM pathway_stats
        WHERE toxic_compound_count > 0
        ORDER BY toxic_compound_count DESC, max_prediction DESC, pathway ASC
        LIMIT 10;
        """

        with sqlite3.connect(db_path) as conn:
          rows = conn.execute(query).fetchall()
          print("rows:", len(rows))
          for row in rows:
            print(row)
    notes:
      - UC6 uses endpoint-level values and threshold filters, without relying on toxicity mean as the decision metric.
      - Pathway ranking is exploratory and reflects annotation-based linkage under selected endpoint context.

  uc3_risk_vs_bioremediation_potential:
    button_label: View Queries
    title: UC-3 Query Recipes (Risk vs Bioremediation Potential)
    introduction: Reproduce the UC-3 scatter base points and dynamic P75 thresholds on compound_summary.
    sqlite:
      description: Compute valid points (non-null risk), P75 thresholds, and quadrant assignment.
      query: |
        WITH scope AS (
          SELECT
            cpd,
            compoundname,
            compoundclass,
            gene_count,
            pathway_count,
            toxicity_risk_mean AS y_value
          FROM compound_summary
          WHERE toxicity_risk_mean IS NOT NULL
        ),
        ranked AS (
          SELECT
            *,
            ROW_NUMBER() OVER (ORDER BY gene_count) AS rn_x,
            ROW_NUMBER() OVER (ORDER BY y_value) AS rn_y,
            COUNT(*) OVER () AS n
          FROM scope
        ),
        thresholds AS (
          SELECT
            MAX(CASE WHEN rn_x = CAST((n - 1) * 0.75 AS INT) + 1 THEN gene_count END) AS x_threshold,
            MAX(CASE WHEN rn_y = CAST((n - 1) * 0.75 AS INT) + 1 THEN y_value END) AS y_threshold
          FROM ranked
        )
        SELECT
          r.cpd,
          r.compoundname,
          r.compoundclass,
          r.gene_count,
          r.pathway_count,
          r.y_value,
          t.x_threshold,
          t.y_threshold,
          CASE
            WHEN r.gene_count >= t.x_threshold AND r.y_value >= t.y_threshold THEN 'top_right'
            WHEN r.gene_count <  t.x_threshold AND r.y_value >= t.y_threshold THEN 'top_left'
            WHEN r.gene_count >= t.x_threshold AND r.y_value <  t.y_threshold THEN 'bottom_right'
            ELSE 'bottom_left'
          END AS quadrant
        FROM ranked r
        CROSS JOIN thresholds t
        ORDER BY r.cpd ASC;
    python:
      description: Python sqlite3 script to run UC-3 base point extraction with thresholds.
      script: |
        import sqlite3

        db_path = "data/biorempp.sqlite"
        query = """
        WITH scope AS (
          SELECT
            cpd,
            compoundname,
            compoundclass,
            gene_count,
            pathway_count,
            toxicity_risk_mean AS y_value
          FROM compound_summary
          WHERE toxicity_risk_mean IS NOT NULL
        ),
        ranked AS (
          SELECT
            *,
            ROW_NUMBER() OVER (ORDER BY gene_count) AS rn_x,
            ROW_NUMBER() OVER (ORDER BY y_value) AS rn_y,
            COUNT(*) OVER () AS n
          FROM scope
        ),
        thresholds AS (
          SELECT
            MAX(CASE WHEN rn_x = CAST((n - 1) * 0.75 AS INT) + 1 THEN gene_count END) AS x_threshold,
            MAX(CASE WHEN rn_y = CAST((n - 1) * 0.75 AS INT) + 1 THEN y_value END) AS y_threshold
          FROM ranked
        )
        SELECT
          r.cpd,
          r.compoundname,
          r.compoundclass,
          r.gene_count,
          r.pathway_count,
          r.y_value,
          t.x_threshold,
          t.y_threshold
        FROM ranked r
        CROSS JOIN thresholds t
        ORDER BY r.cpd ASC;
        """

        with sqlite3.connect(db_path) as conn:
          rows = conn.execute(query).fetchall()
          print("rows:", len(rows))
          for row in rows[:10]:
            print(row)
    notes:
      - Thresholds are percentile-based and context-dependent in the app.
      - This recipe is intended for exploratory reproducibility, not causal inference.
